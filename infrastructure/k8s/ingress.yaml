apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ponder-ingress
  namespace: ponder
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  tls:
  - hosts:
    - app.ponder.school
    - api.ponder.school
    secretName: ponder-tls
  rules:
  - host: app.ponder.school
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ponder-frontend
            port:
              number: 80
  - host: api.ponder.school
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ponder-backend
            port:
              number: 80
