apiVersion: apps/v1
kind: Deployment
metadata:
  name: ponder-frontend
  namespace: ponder
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ponder-frontend
  template:
    metadata:
      labels:
        app: ponder-frontend
    spec:
      containers:
      - name: frontend
        image: ${ECR_REGISTRY}/ponder-frontend:${IMAGE_TAG}
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ponder-frontend
  namespace: ponder
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: ponder-frontend
