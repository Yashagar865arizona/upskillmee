# Docker Compose override for development
# This file is automatically loaded by docker-compose and overrides production settings

services:
  backend:
    build:
      target: development
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    volumes:
      - ../backend:/app
      - /app/.venv
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
    ports:
      - "8000:8000"

  frontend:
    build:
      target: development
    command: npm run dev
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"

  db:
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=ponder_dev
      - POSTGRES_PASSWORD=dev_password
      - POSTGRES_DB=ponder_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ponder_dev -d ponder_dev"]

  redis:
    ports:
      - "6379:6379"
    command: redis-server --requirepass dev_redis_password
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dev_redis_password", "ping"]

  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"

  # Development tools
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - ponder-network
    profiles:
      - dev-tools

  redis-commander:
    image: rediscommander/redis-commander:latest
    hostname: redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379:0:dev_redis_password
    networks:
      - ponder-network
    profiles:
      - dev-tools