# Logstash configuration for Ponder log aggregation
# Processes logs from multiple sources and sends to Elasticsearch

input {
  # Application logs from file
  file {
    path => "/var/log/ponder/app.log"
    start_position => "beginning"
    type => "application"
    tags => ["ponder", "application"]
  }
  
  # Docker container logs
  docker {
    host => "unix:///var/run/docker.sock"
    type => "docker"
    tags => ["ponder", "docker"]
  }
  
  # Nginx access logs
  file {
    path => "/var/log/nginx/access.log"
    start_position => "beginning"
    type => "nginx_access"
    tags => ["ponder", "nginx", "access"]
  }
  
  # Nginx error logs
  file {
    path => "/var/log/nginx/error.log"
    start_position => "beginning"
    type => "nginx_error"
    tags => ["ponder", "nginx", "error"]
  }
  
  # PostgreSQL logs
  file {
    path => "/var/log/postgresql/postgresql.log"
    start_position => "beginning"
    type => "postgresql"
    tags => ["ponder", "database", "postgresql"]
  }
  
  # System logs via syslog
  syslog {
    port => 514
    type => "syslog"
    tags => ["ponder", "system"]
  }
}

filter {
  # Parse application logs
  if [type] == "application" {
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} - %{DATA:logger} - %{LOGLEVEL:level} - %{GREEDYDATA:log_message}" 
      }
    }
    
    date {
      match => [ "timestamp", "yyyy-MM-dd HH:mm:ss,SSS" ]
    }
    
    # Extract error details
    if [level] == "ERROR" or [level] == "CRITICAL" {
      mutate {
        add_tag => ["error"]
        add_field => { "severity" => "high" }
      }
    }
    
    # Extract performance metrics
    if [log_message] =~ /response_time|duration|slow/ {
      mutate {
        add_tag => ["performance"]
      }
    }
    
    # Extract security events
    if [log_message] =~ /authentication|authorization|login|security/ {
      mutate {
        add_tag => ["security"]
      }
    }
  }
  
  # Parse Docker logs
  if [type] == "docker" {
    json {
      source => "message"
    }
    
    mutate {
      add_field => { "container_name" => "%{[attrs][name]}" }
      add_field => { "container_image" => "%{[attrs][image]}" }
    }
    
    # Tag by container type
    if [container_name] =~ /backend/ {
      mutate { add_tag => ["backend"] }
    } else if [container_name] =~ /frontend/ {
      mutate { add_tag => ["frontend"] }
    } else if [container_name] =~ /db|postgres/ {
      mutate { add_tag => ["database"] }
    } else if [container_name] =~ /redis/ {
      mutate { add_tag => ["cache"] }
    }
  }
  
  # Parse Nginx access logs
  if [type] == "nginx_access" {
    grok {
      match => { 
        "message" => "%{NGINXACCESS}" 
      }
    }
    
    # Convert response code to number
    mutate {
      convert => { "response" => "integer" }
    }
    
    # Tag by response code
    if [response] >= 400 and [response] < 500 {
      mutate { add_tag => ["client_error"] }
    } else if [response] >= 500 {
      mutate { add_tag => ["server_error"] }
    }
    
    # Extract slow requests
    if [request_time] and [request_time] > 2.0 {
      mutate { add_tag => ["slow_request"] }
    }
  }
  
  # Parse Nginx error logs
  if [type] == "nginx_error" {
    grok {
      match => { 
        "message" => "%{NGINXERROR}" 
      }
    }
    
    mutate { add_tag => ["error"] }
  }
  
  # Parse PostgreSQL logs
  if [type] == "postgresql" {
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{TZ} \[%{DATA:pid}\] %{WORD:level}: %{GREEDYDATA:log_message}" 
      }
    }
    
    # Extract slow queries
    if [log_message] =~ /duration:/ {
      grok {
        match => { 
          "log_message" => "duration: %{NUMBER:duration:float} ms" 
        }
      }
      
      if [duration] and [duration] > 1000 {
        mutate { add_tag => ["slow_query"] }
      }
    }
    
    # Tag errors
    if [level] == "ERROR" or [level] == "FATAL" {
      mutate { add_tag => ["database_error"] }
    }
  }
  
  # Add common fields
  mutate {
    add_field => { "environment" => "${ENVIRONMENT:development}" }
    add_field => { "service" => "ponder" }
    add_field => { "version" => "${APP_VERSION:unknown}" }
  }
  
  # Remove unnecessary fields
  mutate {
    remove_field => [ "host", "path", "@version" ]
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:localhost:9200}"]
    index => "ponder-logs-%{+YYYY.MM.dd}"
    template_name => "ponder-logs"
    template => "/etc/logstash/templates/ponder-logs.json"
    template_overwrite => true
  }
  
  # Send critical errors to alerting system
  if "error" in [tags] and [level] == "CRITICAL" {
    http {
      url => "${ALERT_WEBHOOK_URL}"
      http_method => "post"
      format => "json"
      mapping => {
        "alert_type" => "log_error"
        "severity" => "critical"
        "message" => "%{log_message}"
        "timestamp" => "%{@timestamp}"
        "source" => "%{type}"
        "environment" => "%{environment}"
      }
    }
  }
  
  # Debug output (remove in production)
  if "${LOG_DEBUG:false}" == "true" {
    stdout { 
      codec => rubydebug 
    }
  }
}